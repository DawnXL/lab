<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CXTI人格测试</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ── 开始页 ── -->
  <div id="screen-start" class="screen active">
    <div class="card start-card">
      <div class="start-badge">测试</div>
      <h1 class="start-title">CXTI人格测试</h1>
      <p class="start-sub">你是哪种爸红丝？</p>
      <p class="start-meta">共 <span id="total-count"></span> 题 · 约 2 分钟</p>
      <input id="nickname-input" class="nickname-input"
             type="text" maxlength="16" placeholder="输入你的昵称（可选）" />
      <button id="btn-start" class="btn btn-primary">开始测试 →</button>
    </div>
  </div>

  <!-- ── 题目页 ── -->
  <div id="screen-question" class="screen">
    <div class="progress-wrap">
      <button id="btn-back" class="btn-back" style="display:none">←</button>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <span id="progress-label" class="progress-label"></span>
    </div>

    <div class="card question-card">
      <p id="question-id" class="question-id"></p>
      <h2 id="question-text" class="question-text"></h2>
      <div id="options-list" class="options-list"></div>
    </div>
  </div>

  <!-- ── 结果页 ── -->
  <div id="screen-result" class="screen">
    <div id="result-card" class="card result-card">
      <p id="result-nickname" class="result-nickname"></p>
      <p id="result-code" class="result-code"></p>
      <h2 id="result-name" class="result-name"></h2>
      <p id="result-cn" class="result-cn"></p>
      <div class="result-divider"></div>
      <div id="result-img-wrap" class="result-img-wrap"></div>
      <p id="result-desc" class="result-desc"></p>
      <div id="result-scores" class="result-scores"></div>
      <button id="btn-save" class="btn btn-save">保存图片 ↓</button>
      <button id="btn-retry" class="btn btn-ghost">再测一次</button>
    </div>
  </div>

</div><!-- #app -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="data/questions.js"></script>
<script src="data/results.js"></script>
<script src="app.js"></script>
</body>
</html>
